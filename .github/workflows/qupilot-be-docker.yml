name: qupilot-be docker

on:
  push:
    branches:
      - main
    paths:
      - qupilot-be/**
  workflow_dispatch:

concurrency:
  group: qupilot-be-deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - 
        name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./qupilot-be
          file: ./qupilot-be/Dockerfile
          push: true
          tags: |
            althof3/qupilot-be:latest
            althof3/qupilot-be:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          EVM_RPC_URL: ${{ secrets.EVM_RPC_URL }}
          CHAIN_ID: ${{ secrets.CHAIN_ID }}
          TREASURY_PRIVATE_KEY: ${{ secrets.TREASURY_PRIVATE_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script_stop: true
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,JWT_SECRET,JWT_EXPIRES_IN,EVM_RPC_URL,CHAIN_ID,TREASURY_PRIVATE_KEY
          script: |
            set -e

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            IMAGE="althof3/qupilot-be:${{ github.sha }}"
            CONTAINER="qupilot-be"

            docker pull "$IMAGE"
            docker rm -f "$CONTAINER" >/dev/null 2>&1 || true

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p 8000:3000 \
              -e PORT=3000 \
              -e SUPABASE_URL="$SUPABASE_URL" \
              -e SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e JWT_EXPIRES_IN="$JWT_EXPIRES_IN" \
              -e EVM_RPC_URL="$EVM_RPC_URL" \
              -e CHAIN_ID="$CHAIN_ID" \
              -e TREASURY_PRIVATE_KEY="$TREASURY_PRIVATE_KEY" \
              "$IMAGE"
